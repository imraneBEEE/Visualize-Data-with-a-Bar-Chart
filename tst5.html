<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Video Game Sales Treemap</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            color: #e2e2e2;
            padding: 40px 20px;
        }

        #title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.12em;
            color: #f0f0f0;
            margin-bottom: 4px;
            text-align: center;
        }

        #description {
            font-size: 0.68rem;
            letter-spacing: 0.18em;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 32px;
            text-align: center;
        }

        #chart-wrapper { position: relative; width: 100%; max-width: 1000px; }

        svg { width: 100%; height: auto; display: block; }

        .tile {
            stroke: #0a0a0f;
            stroke-width: 1px;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .tile:hover { opacity: 0.75; }

        .tile-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 9px;
            fill: rgba(255,255,255,0.85);
            pointer-events: none;
        }

        .legend-item { stroke: #0a0a0f; stroke-width: 0.5px; }

        #tooltip {
            display: none;
            position: fixed;
            background: #111118;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px 14px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            color: #e2e2e2;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            line-height: 1.7;
        }

        #tooltip .tt-name     { font-weight: 600; font-size: 0.78rem; }
        #tooltip .tt-category { color: #888; font-size: 0.68rem; }
        #tooltip .tt-value    { color: #00e5a0; }
    </style>
</head>
<body>

<h1 id="title">Video Game Sales</h1>
<p id="description">Top video game sales grouped by platform — units sold in millions</p>

<div id="chart-wrapper">
    <div id="tooltip"></div>
    <svg id="chart"></svg>
</div>

<script>
    const DATA_URL = "https://cdn.freecodecamp.org/testable-projects-fcc/data/tree_map/video-game-sales-data.json";

    const COLORS = [
        "#e63946","#f4a261","#e9c46a","#2a9d8f","#457b9d",
        "#6a4c93","#f72585","#4cc9f0","#80b918","#ff6b35",
        "#c77dff","#06d6a0","#ffd166","#ef476f","#118ab2",
        "#fb5607","#8338ec","#3a86ff","#ffbe0b","#ff006e"
    ];

    const W = 980, H = 580;
    const LEGEND_H = 100;

    fetch(DATA_URL)
        .then(r => r.json())
        .then(data => {

            const categories = data.children.map(d => d.name);
            const colorScale = d3.scaleOrdinal().domain(categories).range(COLORS);

            const svg = d3.select("#chart")
                .attr("viewBox", `0 0 ${W} ${H + LEGEND_H}`)
                .attr("preserveAspectRatio", "xMidYMid meet");

            const root = d3.hierarchy(data)
                .sum(d => d.value)
                .sort((a, b) => b.value - a.value);

            d3.treemap()
                .size([W, H])
                .paddingInner(1)
                .paddingOuter(2)
                (root);

            const tooltip = document.getElementById("tooltip");

            // Tiles
            const cell = svg.selectAll("g")
                .data(root.leaves())
                .enter()
                .append("g")
                .attr("transform", d => `translate(${d.x0},${d.y0})`);

            cell.append("rect")
                .attr("class", "tile")
                .attr("data-name",     d => d.data.name)
                .attr("data-category", d => d.data.category)
                .attr("data-value",    d => d.data.value)
                .attr("width",  d => d.x1 - d.x0)
                .attr("height", d => d.y1 - d.y0)
                .attr("fill",   d => colorScale(d.data.category))
                .on("mousemove", function(event, d) {
                    tooltip.style.display = "block";
                    tooltip.setAttribute("data-value", d.data.value);
                    tooltip.innerHTML = `
              <div class="tt-name">${d.data.name}</div>
              <div class="tt-category">${d.data.category}</div>
              <div class="tt-value">${(+d.data.value).toFixed(2)}M units</div>
            `;
                    tooltip.style.left = (event.clientX + 16) + "px";
                    tooltip.style.top  = (event.clientY - 50) + "px";
                })
                .on("mouseleave", () => tooltip.style.display = "none");

            // Labels inside tiles
            cell.append("foreignObject")
                .attr("width",  d => Math.max(0, d.x1 - d.x0))
                .attr("height", d => Math.max(0, d.y1 - d.y0))
                .append("xhtml:div")
                .style("width", "100%")
                .style("height", "100%")
                .style("overflow", "hidden")
                .style("padding", "3px")
                .style("font-family", "'IBM Plex Mono', monospace")
                .style("font-size", "8px")
                .style("color", "rgba(255,255,255,0.85)")
                .style("line-height", "1.3")
                .style("pointer-events", "none")
                .text(d => d.data.name);

            // Legend
            const legendCols   = 5;
            const legendItemW  = 160;
            const legendItemH  = 16;
            const legendLeft   = (W - legendCols * legendItemW) / 2;
            const legendTop    = H + 20;

            const legend = svg.append("g")
                .attr("id", "legend")
                .attr("transform", `translate(${legendLeft},${legendTop})`);

            categories.forEach((cat, i) => {
                const col = i % legendCols;
                const row = Math.floor(i / legendCols);
                const gItem = legend.append("g")
                    .attr("transform", `translate(${col * legendItemW}, ${row * (legendItemH + 8)})`);

                gItem.append("rect")
                    .attr("class", "legend-item")
                    .attr("width",  legendItemH)
                    .attr("height", legendItemH)
                    .attr("fill", colorScale(cat));

                gItem.append("text")
                    .attr("x", legendItemH + 6)
                    .attr("y", legendItemH - 3)
                    .attr("fill", "#888")
                    .attr("font-family", "'IBM Plex Mono', monospace")
                    .attr("font-size", "10px")
                    .text(cat);
            });
        });
</script>

<script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</body>
</html>
