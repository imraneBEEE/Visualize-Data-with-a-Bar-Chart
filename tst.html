<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>US GDP Bar Chart</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'IBM Plex Mono', monospace;
            color: #e2e2e2;
            padding: 40px 20px;
        }

        #title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: 0.12em;
            color: #f0f0f0;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-align: center;
        }

        #chart-wrapper {
            position: relative;
            width: 100%;
            max-width: 900px;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .bar {
            fill: #00e5a0;
            transition: fill 0.15s ease;
        }

        .bar:hover {
            fill: #ffffff;
        }

        .tick line {
            stroke: #2a2a35;
        }

        .tick text {
            fill: #888;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
        }

        .domain {
            stroke: #2a2a35;
        }

        #tooltip {
            display: none;
            position: fixed;
            background: #111118;
            border: 1px solid #00e5a0;
            border-radius: 4px;
            padding: 10px 16px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.75rem;
            color: #e2e2e2;
            pointer-events: none;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 0 20px rgba(0, 229, 160, 0.15);
        }

        #tooltip .tt-date {
            color: #00e5a0;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        #tooltip .tt-gdp {
            color: #aaa;
        }

        .grid line {
            stroke: #1a1a22;
            stroke-dasharray: 2,3;
        }

        .grid .domain { display: none; }
    </style>
</head>
<body>

<h1 id="title">United States GDP</h1>
<p class="subtitle">Quarterly gross domestic product — 1947 to 2015</p>

<div id="chart-wrapper">
    <div id="tooltip"></div>
    <svg id="chart"></svg>
</div>

<script>
    const DATA_URL = "https://raw.githubusercontent.com/freeCodeCamp/ProjectReferenceData/master/GDP-data.json";

    const margin = { top: 30, right: 30, bottom: 60, left: 80 };
    const W = 860;
    const H = 460;
    const innerW = W - margin.left - margin.right;
    const innerH = H - margin.top - margin.bottom;

    const svg = d3.select("#chart")
        .attr("viewBox", `0 0 ${W} ${H}`)
        .attr("preserveAspectRatio", "xMidYMid meet");

    const g = svg.append("g")
        .attr("transform", `translate(${margin.left},${margin.top})`);

    const tooltip = document.getElementById("tooltip");

    fetch(DATA_URL)
        .then(r => r.json())
        .then(json => {
            const data = json.data;

            const xScale = d3.scaleTime()
                .domain([
                    d3.min(data, d => new Date(d[0])),
                    d3.max(data, d => new Date(d[0]))
                ])
                .range([0, innerW]);

            const yScale = d3.scaleLinear()
                .domain([0, d3.max(data, d => d[1])])
                .nice()
                .range([innerH, 0]);

            const barWidth = innerW / data.length;

            // Horizontal grid
            g.append("g")
                .attr("class", "grid")
                .call(d3.axisLeft(yScale)
                    .tickSize(-innerW)
                    .tickFormat("")
                );

            // X Axis
            g.append("g")
                .attr("id", "x-axis")
                .attr("transform", `translate(0,${innerH})`)
                .call(d3.axisBottom(xScale).ticks(d3.timeYear.every(5)));

            // Y Axis
            g.append("g")
                .attr("id", "y-axis")
                .call(d3.axisLeft(yScale)
                    .tickFormat(d => `$${d3.format(",")(d)}B`)
                );

            // Y label
            g.append("text")
                .attr("transform", "rotate(-90)")
                .attr("x", -innerH / 2)
                .attr("y", -65)
                .attr("text-anchor", "middle")
                .attr("fill", "#555")
                .attr("font-family", "'IBM Plex Mono', monospace")
                .attr("font-size", "11px")
                .attr("letter-spacing", "0.15em")
                .text("BILLIONS USD");

            // Bars
            g.selectAll(".bar")
                .data(data)
                .enter()
                .append("rect")
                .attr("class", "bar")
                .attr("data-date", d => d[0])
                .attr("data-gdp", d => d[1])
                .attr("x", d => xScale(new Date(d[0])))
                .attr("y", d => yScale(d[1]))
                .attr("width", barWidth)
                .attr("height", d => innerH - yScale(d[1]))
                .on("mousemove", function(event, d) {
                    const date = new Date(d[0]);
                    const quarter = ["Q1","Q2","Q3","Q4"][Math.floor(date.getMonth() / 3)];
                    const year = date.getFullYear();
                    tooltip.style.display = "block";
                    tooltip.setAttribute("data-date", d[0]);
                    tooltip.innerHTML = `
              <div class="tt-date">${year} ${quarter}</div>
              <div class="tt-gdp">$${d3.format(",")(d[1])} Billion</div>
            `;
                    tooltip.style.left = (event.clientX + 16) + "px";
                    tooltip.style.top  = (event.clientY - 40) + "px";
                })
                .on("mouseleave", function() {
                    tooltip.style.display = "none";
                });
        });
</script>

<script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</body>
</html>
