<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cycling Doping Scatterplot</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Mono', monospace;
      color: #e2e2e2;
      padding: 40px 20px;
    }

    #title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: 0.12em;
      color: #f0f0f0;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 40px;
      text-align: center;
    }

    #chart-wrapper {
      position: relative;
      width: 100%;
      max-width: 920px;
    }

    svg { width: 100%; height: auto; display: block; }

    .dot {
      stroke: none;
      opacity: 0.85;
      transition: opacity 0.15s, r 0.15s;
      cursor: pointer;
    }
    .dot:hover { opacity: 1; }

    .dot.doping   { fill: #ff4d6d; }
    .dot.nodoping { fill: #00e5a0; }

    .tick line  { stroke: #2a2a35; }
    .tick text  { fill: #888; font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
    .domain     { stroke: #2a2a35; }

    .grid line   { stroke: #1a1a22; stroke-dasharray: 2,3; }
    .grid .domain { display: none; }

    #tooltip {
      display: none;
      position: fixed;
      background: #111118;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 10px 16px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: #e2e2e2;
      pointer-events: none;
      z-index: 100;
      white-space: nowrap;
      max-width: 260px;
      white-space: normal;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      line-height: 1.6;
    }

    #tooltip .tt-name  { font-weight: 600; font-size: 0.8rem; margin-bottom: 2px; }
    #tooltip .tt-time  { color: #00e5a0; }
    #tooltip .tt-doping { color: #ff4d6d; margin-top: 4px; font-size: 0.68rem; }
    #tooltip .tt-clean  { color: #555; margin-top: 4px; font-size: 0.68rem; }

    #legend {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      color: #888;
    }

    .legend-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<h1 id="title">Doping in Professional Cycling</h1>
<p class="subtitle">35 fastest times up Alpe d'Huez — suspected doping highlighted</p>

<div id="chart-wrapper">
  <div id="tooltip"></div>
  <svg id="chart"></svg>
</div>

<script>
  const DATA_URL = "https://raw.githubusercontent.com/freeCodeCamp/ProjectReferenceData/master/cyclist-data.json";

  const margin = { top: 30, right: 30, bottom: 60, left: 70 };
  const W = 900, H = 500;
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  const svg = d3.select("#chart")
          .attr("viewBox", `0 0 ${W} ${H}`)
          .attr("preserveAspectRatio", "xMidYMid meet");

  const g = svg.append("g")
          .attr("transform", `translate(${margin.left},${margin.top})`);

  const tooltip = document.getElementById("tooltip");

  fetch(DATA_URL)
          .then(r => r.json())
          .then(data => {

            // Parse time string "M:SS" into a Date object (minutes on y-axis)
            data.forEach(d => {
              const [m, s] = d.Time.split(":").map(Number);
              d.ParsedTime = new Date(1970, 0, 1, 0, m, s);
            });

            const xScale = d3.scaleLinear()
                    .domain([d3.min(data, d => d.Year) - 1, d3.max(data, d => d.Year) + 1])
                    .range([0, innerW]);

            const yScale = d3.scaleTime()
                    .domain(d3.extent(data, d => d.ParsedTime))
                    .range([0, innerH]);

            // Grid
            g.append("g")
                    .attr("class", "grid")
                    .call(d3.axisLeft(yScale).tickSize(-innerW).tickFormat(""));

            // X Axis
            g.append("g")
                    .attr("id", "x-axis")
                    .attr("transform", `translate(0,${innerH})`)
                    .call(d3.axisBottom(xScale).tickFormat(d3.format("d")));

            // Y Axis
            g.append("g")
                    .attr("id", "y-axis")
                    .call(d3.axisLeft(yScale).tickFormat(d3.timeFormat("%M:%S")));

            // Y label
            g.append("text")
                    .attr("transform", "rotate(-90)")
                    .attr("x", -innerH / 2)
                    .attr("y", -55)
                    .attr("text-anchor", "middle")
                    .attr("fill", "#555")
                    .attr("font-family", "'IBM Plex Mono', monospace")
                    .attr("font-size", "11px")
                    .attr("letter-spacing", "0.15em")
                    .text("TIME (MM:SS)");

            // Dots
            g.selectAll(".dot")
                    .data(data)
                    .enter()
                    .append("circle")
                    .attr("class", d => `dot ${d.Doping ? "doping" : "nodoping"}`)
                    .attr("r", 6)
                    .attr("cx", d => xScale(d.Year))
                    .attr("cy", d => yScale(d.ParsedTime))
                    .attr("data-xvalue", d => d.Year)
                    .attr("data-yvalue", d => d.ParsedTime.toISOString())
                    .on("mousemove", function(event, d) {
                      tooltip.style.display = "block";
                      tooltip.setAttribute("data-year", d.Year);
                      tooltip.innerHTML = `
              <div class="tt-name">${d.Name} — ${d.Nationality}</div>
              <div class="tt-time">Year: ${d.Year} &nbsp;|&nbsp; Time: ${d.Time}</div>
              ${d.Doping
                              ? `<div class="tt-doping">⚠ ${d.Doping}</div>`
                              : `<div class="tt-clean">✓ No doping allegations</div>`}
            `;
                      tooltip.style.left = (event.clientX + 16) + "px";
                      tooltip.style.top  = (event.clientY - 40) + "px";
                    })
                    .on("mouseleave", () => tooltip.style.display = "none");

            // Legend
            const legend = g.append("g")
                    .attr("id", "legend")
                    .attr("transform", `translate(${innerW - 10}, ${innerH / 2 - 30})`);

            const legendData = [
              { label: "Doping allegation", cls: "#ff4d6d" },
              { label: "No allegation",     cls: "#00e5a0" }
            ];

            legendData.forEach((item, i) => {
              const row = legend.append("g").attr("transform", `translate(0, ${i * 24})`);
              row.append("circle").attr("r", 6).attr("cx", -14).attr("cy", -4).attr("fill", item.cls);
              row.append("text")
                      .attr("x", -26)
                      .attr("text-anchor", "end")
                      .attr("fill", "#888")
                      .attr("font-family", "'IBM Plex Mono', monospace")
                      .attr("font-size", "11px")
                      .text(item.label);
            });
          });
</script>

<script src="https://cdn.freecodecamp.org/testable-projects-fcc/v1/bundle.js"></script>
</body>
</html>
